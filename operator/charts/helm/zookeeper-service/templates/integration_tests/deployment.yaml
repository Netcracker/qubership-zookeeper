{{- if .Values.integrationTests.install }}
{{- $integrationTestsPodSecretsMount := include "zookeeper.podSecretsMountPath" (dict "service" "zookeeper-integration-tests") -}}
{{- $s3AliasesData := fromYaml (include "backupDaemon.s3Aliases" .) }}
{{- $defaultS3AliasName := "" }}
{{- range $s3AliasesData.items }}
  {{- if and .name .spec .spec.default }}
    {{- $defaultS3AliasName = .name }}
  {{- end }}
{{- end }}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Values.integrationTests.service.name }}
  labels:
    {{- include "zookeeper.defaultLabels" . | nindent 4 }}
    name: {{ .Values.integrationTests.service.name }}
    app.kubernetes.io/name: {{ .Values.integrationTests.service.name }}
    app.kubernetes.io/instance: {{ cat .Values.integrationTests.service.name .Values.DELIMITER .Release.Namespace | nospace | trunc 63 }}
    app.kubernetes.io/technology: python
spec:
  selector:
    matchLabels:
      name: {{ .Values.integrationTests.service.name }}
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "zookeeper.defaultLabels" . | nindent 8 }}
      {{- with .Values.global.customLabels }}
        {{- toYaml . | nindent 8 -}}
      {{- end }}
      {{- with .Values.integrationTests.customLabels }}
        {{- toYaml . | nindent 8 -}}
      {{- end }}
        name: {{ .Values.integrationTests.service.name }}
        app.kubernetes.io/name: {{ .Values.integrationTests.service.name }}
      annotations:
        checksum/zookeeper-integration-tests-pod-secrets: {{ printf "%v-%v-%v-%v" .Values.backupDaemon.install .Values.backupDaemon.s3.enabled .Values.integrationTests.atpReport.enabled (include "monitoring.install" .) | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.integrationTests.service.name }}
      {{- if .Values.integrationTests.affinity }}
      affinity:
        {{ .Values.integrationTests.affinity | toJson }}
      {{- end }}
      containers:
        - name: {{ .Values.integrationTests.service.name }}
          image: {{ template "zookeeper-integration-tests.image" . }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: TAGS
              value: {{ .Values.integrationTests.tags }}
            {{- if .Values.deployDescriptor }}
            - name: MONITORED_IMAGES
              value: {{ include "zookeeper-service.monitoredImages" . }}
            {{- end }}
            - name: DR_SIDE
              value: {{ default "" }}
            - name: OS_URL
              value: {{ .Values.integrationTests.url }}
            - name: OS_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ZOOKEEPER_IS_MANAGED_BY_OPERATOR
              value: {{ .Values.integrationTests.zookeeperIsManagedByOperator | quote }}
            - name: ZOOKEEPER_OS_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ZOOKEEPER_HOST
              value: {{ .Values.integrationTests.zookeeperHost }}
            - name: ZOOKEEPER_PORT
              value: {{ .Values.integrationTests.zookeeperPort | quote }}
            - name: ZOOKEEPER_ENABLE_TLS
              value: {{ include "zookeeper-service.enableSsl" . | quote }}
            - name: ZOOKEEPER_VOLUME_SIZE
              value: {{ .Values.integrationTests.zookeeperVolumeSize | default 2 | quote }}
            - name: INTEGRATION_TESTS_SECRETS_DIR
              value: {{ $integrationTestsPodSecretsMount | quote }}
            {{- if .Values.backupDaemon.install }}
            - name: PV_TYPE
              value: {{ .Values.integrationTests.pvType }}
            - name: ZOOKEEPER_BACKUP_DAEMON_PROTOCOL
              value:  {{ template "backupDaemon.Protocol" . }}
            - name: ZOOKEEPER_BACKUP_DAEMON_HOST
              value: {{ template "zookeeper.name" . }}-backup-daemon
            - name: ZOOKEEPER_BACKUP_DAEMON_PORT
            {{- if (eq (include "backupDaemon.enableSsl" .) "true") }}
              value: "8443"
            {{ else }}
              value: "8080"
            {{- end }}
            {{- end }}
            {{- if and .Values.backupDaemon.install .Values.backupDaemon.s3.enabled }}
            - name: S3_ENABLED
              value: "true"
            - name: S3_ALIASES_SECRET_NAME
              value: {{ template "zookeeper.name" . }}-backup-daemon-s3-aliases
            - name: S3_DEFAULT_ALIAS_NAME
              value: {{ default "default" $defaultS3AliasName | quote }}
            {{- end }}
            - name: PROMETHEUS_URL
              value: {{ .Values.integrationTests.prometheusUrl }}
            {{- if .Values.integrationTests.monitoredImages }}
            - name: MONITORED_IMAGES
              value: {{ .Values.integrationTests.monitoredImages | quote }}
            {{- end }}
            {{- if .Values.integrationTests.atpReport.enabled }}
            # ATP Storage configuration for S3 test results upload
            - name: ATP_REPORT_ENABLED
              value: {{ .Values.integrationTests.atpReport.enabled | quote }}
            - name: ATP_STORAGE_PROVIDER
              value: {{ .Values.integrationTests.atpReport.atpStorage.provider | quote }}
            - name: ATP_STORAGE_SERVER_URL
              value: {{ .Values.integrationTests.atpReport.atpStorage.serverUrl | quote }}
            - name: ATP_STORAGE_SERVER_UI_URL
              value: {{ .Values.integrationTests.atpReport.atpStorage.serverUiUrl | quote }}
            - name: ATP_STORAGE_BUCKET
              value: {{ .Values.integrationTests.atpReport.atpStorage.bucket | quote }}
            - name: ATP_STORAGE_REGION
              value: {{ .Values.integrationTests.atpReport.atpStorage.region | quote }}
            - name: ATP_REPORT_VIEW_UI_URL
              value: {{ .Values.integrationTests.atpReportViewUiUrl | quote }}
            {{- end }}
            - name: ENVIRONMENT_NAME
              value: {{ .Values.integrationTests.environmentName | quote }}
            - name: RANDOM_RUN_TRIGGER
              value: {{ randAlphaNum 10 | quote }}
            - name: PART_OF
              value: {{ .Values.PART_OF | quote }}
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          resources:
            requests:
              memory: {{ default "256Mi" .Values.integrationTests.resources.requests.memory }}
              cpu: {{ default "200m" .Values.integrationTests.resources.requests.cpu }}
            limits:
              memory: {{ default "256Mi" .Values.integrationTests.resources.limits.memory }}
              cpu: {{ default "400m" .Values.integrationTests.resources.limits.cpu }}
          volumeMounts:
            {{- include "zookeeper-service.tmpVolumeMount" . | nindent 12 }}
            - name: zookeeper-integration-tests-pod-secrets
              mountPath: {{ $integrationTestsPodSecretsMount }}
              readOnly: true
            - name: output
              mountPath: /opt/robot/output
          {{- if and (eq (include "zookeeper-service.enableSsl" .) "true") (include "zookeeper-service.sslSecretName" .) }}
            - name: ssl-certs
              mountPath: /tls
          {{- end }}
          {{- if and (eq (include "backupDaemon.enableSsl" .) "true") (include "backupDaemon.sslSecretName" .) }}
            - name: backup-ssl-certs
              mountPath: /backupTLS
          {{- end }}
          terminationMessagePath: /dev/termination-log
          imagePullPolicy: Always
          securityContext:
            {{- include "zookeeper-service.globalContainerSecurityContext" . | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'cat /opt/robot/output/result.txt | grep -q "RESULT: TESTS PASSED"'
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "true"]
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 5
      volumes:
        {{- include "zookeeper-service.tmpVolume" . | nindent 8 }}
        - name: zookeeper-integration-tests-pod-secrets
          projected:
            defaultMode: 420
            sources:
              - secret:
                  name: {{ template "zookeeper.name" . }}-secret
                  items:
                    - key: admin-username
                      path: ZOOKEEPER_ADMIN_USERNAME
                    - key: admin-password
                      path: ZOOKEEPER_ADMIN_PASSWORD
                    - key: client-username
                      path: ZOOKEEPER_CLIENT_USERNAME
                    - key: client-password
                      path: ZOOKEEPER_CLIENT_PASSWORD
              {{- if .Values.backupDaemon.install }}
              - secret:
                  name: {{ template "zookeeper.name" . }}-backup-daemon-secret
                  items:
                    - key: username
                      path: ZOOKEEPER_BACKUP_DAEMON_USERNAME
                    - key: password
                      path: ZOOKEEPER_BACKUP_DAEMON_PASSWORD
              {{- if .Values.backupDaemon.s3.enabled }}
              - secret:
                  name: {{ template "zookeeper.name" . }}-s3-secret
                  items:
                    - key: s3-key-secret
                      path: S3_KEY_SECRET
              {{- end }}
              {{- end }}
              - secret:
                  name: {{ .Values.integrationTests.service.name }}-secret
                  items:
                    - key: prometheus-user
                      path: PROMETHEUS_USER
                    - key: prometheus-password
                      path: PROMETHEUS_PASSWORD
              {{- if .Values.integrationTests.atpReport.enabled }}
              - secret:
                  name: {{ .Values.integrationTests.service.name }}-atp-storage-secret
                  items:
                    - key: atp-storage-username
                      path: ATP_STORAGE_USERNAME
                    - key: atp-storage-password
                      path: ATP_STORAGE_PASSWORD
              {{- end }}
        - name: output
          emptyDir: {}
      {{- if and (eq (include "zookeeper-service.enableSsl" .) "true") (include "zookeeper-service.sslSecretName" .) }}
        - name: ssl-certs
          secret:
            secretName: {{ template "zookeeper-service.sslSecretName" . }}
      {{- end }}
      {{- if and (eq (include "backupDaemon.enableSsl" .) "true") (include "backupDaemon.sslSecretName" .) }}
        - name: backup-ssl-certs
          secret:
            secretName: {{ template "backupDaemon.sslSecretName" . }}
      {{- end }}
      securityContext:
        {{- include "zookeeper-service.globalPodSecurityContext" . | nindent 8 }}
        {{- with .Values.integrationTests.securityContext }}
        {{- toYaml . | nindent 8 -}}
        {{- end }}
{{- end }}
