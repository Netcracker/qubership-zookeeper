name: Run Nightly Zookeeper Pipeline

permissions:
  contents: read

on:
  push
#  schedule:
#    - cron: '0 1 * * *'

jobs:
  Nightly-Zookeeper-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/zookeeper.yaml@nightly_zookeeper
    with:
      service_branch: '${{ github.head_ref || github.ref_name }}'
      pipeline_branch: 'nightly_zookeeper' #this value must match the value after '@' in 'uses'
      runner_type: 'ubuntu-latest'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
