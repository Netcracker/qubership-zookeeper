name: Run Nightly Zookeeper Pipeline

permissions:
  actions: write
  contents: read

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Nightly-Zookeeper-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/zookeeper.yaml@006f4c99bd9167307208d09252aa005208a4af0d # v1.13.2
    with:
      service_branch: '${{ github.head_ref || github.ref_name }}'
      pipeline_branch: '006f4c99bd9167307208d09252aa005208a4af0d' #this value must match the value after '@' in 'uses'
      runner_type: 'ubuntu-latest'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
